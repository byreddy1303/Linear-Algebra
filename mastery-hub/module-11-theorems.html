      <P>All Jordan blocks are <T src="J_k(0)"/>.</P>
    </Edge>
  </Thm>

  <Thm num="11.6" title="Involutory: A² = I ⇒ λ = ±1" tag="GATE">
    <Statement>If A² = I, then eigenvalues are ±1; A is diagonalisable; A = A⁻¹.</Statement>
    <Proof>From <T src="A^2 v = v"/> and Av = λv: λ²v = v → λ² = 1 → λ = ±1. Min poly is at most λ² − 1 = (λ−1)(λ+1), distinct roots → diagonalisable.</Proof>
    <Intuition>Doing the operation twice = identity → either fixes a direction (λ = 1) or flips it (λ = −1).</Intuition>
    <Edge>Reflection matrices are involutory. Inverse equals itself.</Edge>
  </Thm>

  <Thm num="11.7" title="Identity matrix: every nonzero v is an eigenvector with λ = 1" tag="CORE">
    <Statement>For <T src="I_n"/>: every vector is an eigenvector with eigenvalue 1. am(1) = gm(1) = n.</Statement>
    <Proof>Iv = v = 1·v.</Proof>
    <Intuition>Identity does nothing → every direction is preserved trivially.</Intuition>
    <Edge>The only matrix with a SINGLE eigenvalue of geometric multiplicity = n (any other matrix with this property is cI for some scalar c).</Edge>
  </Thm>

  <Thm num="11.8" title="Positive Definite: all λ > 0 (symmetric A)" tag="GATE">
    <Statement>A real symmetric A is positive definite iff all eigenvalues are STRICTLY POSITIVE. Equivalent: <T src="x^\top A x &gt; 0"/> for all x ≠ 0.</Statement>
    <Proof>
      <P>(⇒) Take eigenvector v: <T src="v^\top A v = \lambda \|v\|^2 &gt; 0"/> → λ &gt; 0.</P>
      <P>(⇐) Diagonalise A = QΛQᵀ; <T src="x^\top A x = (Q^\top x)^\top \Lambda (Q^\top x) = \sum \lambda_i y_i^2 &gt; 0"/> for x ≠ 0 since all λᵢ &gt; 0.</P>
    </Proof>
    <Intuition>PD = "always-positive bilinear form". Geometrically: the level sets <T src="x^\top A x = c"/> are ELLIPSOIDS centred at origin.</Intuition>
    <Edge>
      <P>Equivalent criteria: all LEADING principal minors &gt; 0 (Sylvester's criterion).</P>
      <P>PD ⇒ invertible (no zero eigenvalue).</P>
      <P>Has unique "square root" matrix B with B² = A.</P>
      <P>Cholesky decomposable: A = LLᵀ.</P>
    </Edge>
  </Thm>

  <Thm num="11.9" title="Positive Semi-Definite: all λ ≥ 0" tag="GATE">
    <Statement>Real symmetric A is positive semi-definite iff all eigenvalues are ≥ 0; equivalently <T src="x^\top A x \geq 0"/> for all x.</Statement>
    <Proof>As in 11.8 with ≥ instead of &gt;.</Proof>
    <Intuition>PSD can have some "flat" directions (λ = 0) where the form vanishes.</Intuition>
    <Edge>
      <P>PSD with rank r &lt; n: form is positive on an r-dim subspace, zero on the kernel.</P>
      <P>AᵀA is always PSD (and PD iff A has full column rank).</P>
    </Edge>
  </Thm>

  <Thm num="11.10" title="Hermitian: real eigenvalues + orthonormal complex eigenvectors" tag="GATE">
    <Statement>Complex A with <T src="A = A^*"/> (conjugate transpose) is Hermitian. All eigenvalues are REAL; A is unitarily diagonalisable: <T src="A = U \Lambda U^*"/>.</Statement>
    <Proof>Direct analogue of Spectral Theorem 10.3 with conjugate-transpose replacing transpose.</Proof>
    <Intuition>Hermitian is the complex generalisation of symmetric — same real-spectrum guarantees.</Intuition>
    <Edge>Real symmetric matrices are a special case of Hermitian.</Edge>
  </Thm>

  <Thm num="11.11" title="Unitary: |λ| = 1, AA* = I" tag="GATE">
    <Statement>Complex A with <T src="A^* A = I"/> is unitary. All eigenvalues satisfy |λ| = 1; A preserves complex inner product.</Statement>
    <Proof>Direct analogue of orthogonal matrix theorem 11.3.</Proof>
    <Intuition>Unitary = complex rotation — preserves all complex norms.</Intuition>
    <Edge>
      <P>A⁻¹ = A* (conjugate transpose).</P>
      <P>Real orthogonal matrices are unitary.</P>
      <P>Columns AND rows form orthonormal sets in ℂⁿ.</P>
    </Edge>
  </Thm>

  <Thm num="11.12" title="Normal: AA* = A*A ⇒ unitarily diagonalisable" tag="GATE">
    <Statement>A is normal iff <T src="A A^* = A^* A"/> iff A is UNITARILY DIAGONALISABLE: <T src="A = U \Lambda U^*"/> with U unitary.</Statement>
    <Proof>(⇐) Substitute and use diagonal commuting. (⇒) Schur decomposition gives A = UTU*; if A is normal, T must be diagonal (computation on T*T = TT* forces zero off-diagonals).</Proof>
    <Intuition>Normal = "well-behaved enough to have an orthonormal eigenbasis", encompassing Hermitian, unitary, skew-Hermitian.</Intuition>
    <Edge>
      <P>Subsumes all the "nice" complex matrix types.</P>
      <P>Eigenvalues can be ANY complex numbers (no |λ| or real restriction unless extra structure).</P>
    </Edge>
  </Thm>

  <Thm num="11.13" title="Trace of idempotent = rank of idempotent" tag="GATE">
    <Statement>For idempotent A: rank(A) = trace(A) (and both equal the number of eigenvalues equal to 1).</Statement>
    <Proof>From 11.4: idempotent diagonalisable with eigenvalues 0/1. Trace = sum of λ = number of 1's = rank.</Proof>
    <Intuition>An idempotent projects onto its column space; the "trace counts dimensions preserved".</Intuition>
    <Edge>Quick GATE shortcut: if you see "idempotent" with a trace number, instantly know the rank.</Edge>
  </Thm>

  <Thm num="11.14" title="Determinant of orthogonal/unitary matrix is ±1 / unit complex" tag="GATE">
    <Statement>Orthogonal A: <T src="(\det A)^2 = 1"/> → det A = ±1. Unitary A: <T src="|\det A| = 1"/> (so det A is on unit circle, possibly complex).</Statement>
    <Proof>From <T src="A^\top A = I"/> resp. <T src="A^* A = I"/>: det squared / det times conjugate = 1.</Proof>
    <Intuition>Rigid motions can flip orientation (det = −1 reflection) or preserve it (det = +1 rotation), but never expand or contract.</Intuition>
    <Edge>Special Orthogonal group SO(n): orthogonal with det = +1 (proper rotations).</Edge>
  </Thm>

</Cat>

{/* ═════════════════════════════════════════════════════════════
    CATEGORY 12 — AB vs BA (commutator-related results)
    ═════════════════════════════════════════════════════════════ */}
<Cat id="cat-abba" icon="12" title="AB vs BA"
  desc="When matrix multiplication commutes for traces, eigenvalues, and structure"
  count={5}>

  <Thm num="12.1" title="tr(AB) = tr(BA)" tag="GATE">
    <Statement><T src="\operatorname{tr}(AB) = \operatorname{tr}(BA)"/> whenever both products are defined.</Statement>
    <Proof>See Theorem 1.6.</Proof>
    <Intuition>Trace ignores cyclic order.</Intuition>
    <Edge>A may be m×n, B may be n×m — they need not be individually square. Both AB (m×m) and BA (n×n) need not even have the same size, yet share the trace value.</Edge>
  </Thm>

  <Thm num="12.2" title="AB and BA have the SAME nonzero eigenvalues" tag="GATE">
    <Statement>For A (m×n), B (n×m): the nonzero eigenvalues of AB and BA are IDENTICAL (with same algebraic multiplicities).</Statement>
    <Proof>
      <P>Suppose ABv = λv with λ ≠ 0. Let w = Bv. Then BAw = B(ABv) = λ(Bv) = λw; also w = Bv ≠ 0 (else ABv = 0 = λv → λ = 0 contradiction). So λ is an eigenvalue of BA.</P>
      <P>By symmetry, BA's nonzero eigenvalues are also AB's. Multiplicity arguments via characteristic polynomial: <T src="\lambda^m \det(\lambda I_n - BA) = \lambda^n \det(\lambda I_m - AB)"/>.</P>
    </Proof>
    <Intuition>AB and BA are similar UP TO the kernel; the action on the "interesting" subspace (nonzero λ) is identical.</Intuition>
    <Edge>
      <P>Zero eigenvalues may DIFFER in multiplicity when AB and BA have different sizes.</P>
      <P>If A, B are both n×n: AB and BA have EXACTLY the same characteristic polynomial → same eigenvalues with same multiplicities.</P>
    </Edge>
  </Thm>

  <Thm num="12.3" title="det(AB) = det(BA) for square A, B" tag="GATE">
    <Statement>For square A, B of the same size: <T src="\det(AB) = \det(A)\det(B) = \det(BA)"/>.</Statement>
    <Proof>Multiplicativity (2.1) gives both equal to <T src="\det A \cdot \det B"/>.</Proof>
    <Intuition>Both products have the same eigenvalues → same product of eigenvalues = same determinant.</Intuition>
    <Edge>
      <P>For A (m×n), B (n×m) with m ≠ n: <T src="\det(AB) \neq \det(BA)"/> typically; in fact the two have different sizes (m×m vs n×n).</P>
      <P>Sylvester's determinant theorem: <T src="\det(I_m + AB) = \det(I_n + BA)"/> for ANY rectangular A, B compatible sizes.</P>
    </Edge>
  </Thm>

  <Thm num="12.4" title="AB − BA can never equal I" tag="GATE">
    <Statement>For square A, B of any size: <T src="AB - BA \neq I"/>.</Statement>
    <Proof>If AB − BA = I, take trace: <T src="\operatorname{tr}(AB) - \operatorname{tr}(BA) = \operatorname{tr}(I) = n"/>. But trace(AB) = trace(BA), so left side = 0 → 0 = n, contradiction.</Proof>
    <Intuition>The commutator [A, B] = AB − BA has trace 0 always; identity I has trace n ≠ 0.</Intuition>
    <Edge>True over ℝ and ℂ (any field of characteristic 0). In characteristic p with p | n, this can fail (rare in GATE).</Edge>
  </Thm>

  <Thm num="12.5" title="Commuting matrices share eigenvectors (when diagonalizable)" tag="GATE">
    <Statement>If A and B are both diagonalizable AND commute (AB = BA), they share a common basis of eigenvectors.</Statement>
    <Proof>See 10.4.</Proof>
    <Intuition>Commuting linear maps "agree" on natural decomposition axes — they share preferred directions.</Intuition>
    <Edge>Commutativity alone (without diagonalisability) doesn't imply shared eigenbasis — Jordan-block defects can break it.</Edge>
  </Thm>

</Cat>

{/* ═════════════════════════════════════════════════════════════
    CATEGORY 13 — ORTHOGONALITY, GRAM–SCHMIDT, PROJECTIONS
    ═════════════════════════════════════════════════════════════ */}
<Cat id="cat-ortho" icon="13" title="Orthogonality, Projections, Gram–Schmidt"
  desc="Orthogonal complements, projection formulas, QR existence"
  count={6}>

  <Thm num="13.1" title="Orthogonal vectors are linearly independent" tag="CORE">
    <Statement>A set of nonzero MUTUALLY ORTHOGONAL vectors <T src="\{v_1, \ldots, v_k\}"/> is linearly independent.</Statement>
    <Proof>Suppose <T src="\sum c_i v_i = 0"/>. Take inner product with vⱼ: <T src="\sum c_i \langle v_i, v_j\rangle = c_j \|v_j\|^2 = 0"/>. Since vⱼ ≠ 0, cⱼ = 0.</Proof>
    <Intuition>Orthogonal vectors point in "completely separate" directions → no cancellation possible.</Intuition>
    <Edge>Orthonormal sets in ℝⁿ have at most n elements; n orthonormal vectors form a basis.</Edge>
  </Thm>

  <Thm num="13.2" title="Pythagorean theorem for orthogonal vectors" tag="CORE">
    <Statement>If u ⊥ v then <T src="\|u + v\|^2 = \|u\|^2 + \|v\|^2"/>.</Statement>
    <Proof><T src="\|u+v\|^2 = \langle u+v, u+v\rangle = \|u\|^2 + 2\langle u,v\rangle + \|v\|^2 = \|u\|^2 + \|v\|^2"/> since <T src="\langle u, v\rangle = 0"/>.</Proof>
    <Intuition>Right-angle triangle in any dimension — Pythagoras generalises directly to ℝⁿ.</Intuition>
    <Edge>Generalises to mutually orthogonal sets: <T src="\|v_1 + \cdots + v_k\|^2 = \sum \|v_i\|^2"/>.</Edge>
  </Thm>

  <Thm num="13.3" title="Orthogonal projection onto a subspace" tag="GATE">
    <Statement>Let W = span of orthonormal {'{q₁, …, qₖ}'}. The orthogonal projection of v ∈ ℝⁿ onto W is
      <BT src={String.raw`\mathrm{proj}_W v = \sum_{i=1}^k \langle v, q_i\rangle q_i = QQ^\top v`}/>
      where Q is the matrix with qᵢ as columns. The "error" <T src="v - \mathrm{proj}_W v"/> is orthogonal to W.</Statement>
    <Proof>
      <P>Decompose v = w + u with w ∈ W, u ⊥ W. The unique such w is the projection. Coefficients: w = <T src="\sum c_i q_i"/> with <T src="c_i = \langle v, q_i\rangle"/> from orthonormality.</P>
    </Proof>
    <Intuition>Projection = "best approximation in W". The error is what couldn't be captured — automatically perpendicular.</Intuition>
    <Edge>
      <P>Projection matrix P = QQᵀ is symmetric AND idempotent (P² = P).</P>
      <P>For general (non-orthonormal) basis: P = A(AᵀA)⁻¹Aᵀ (least squares hat matrix).</P>
    </Edge>
  </Thm>

  <Thm num="13.4" title="Gram–Schmidt: any LI set can be orthonormalised" tag="GATE">
    <Statement>Given LI vectors <T src="v_1, \ldots, v_k"/>, the Gram–Schmidt process produces an orthonormal set <T src="q_1, \ldots, q_k"/> with the same span.</Statement>
    <Proof>
      <P>Set <T src="u_1 = v_1, q_1 = u_1/\|u_1\|"/>. For j ≥ 2:
        <T src="u_j = v_j - \sum_{i&lt;j} \langle v_j, q_i\rangle q_i, \quad q_j = u_j/\|u_j\|"/>.
      Each uⱼ is the part of vⱼ orthogonal to span of previous q's; non-zero because v's are LI.</P>
    </Proof>
    <Intuition>Project away the "already covered" directions, then normalise.</Intuition>
    <Edge>
      <P>Numerically unstable in floating point — modified Gram–Schmidt or Householder preferred for practice.</P>
      <P>Produces the QR factorisation A = QR with Q orthonormal columns, R upper triangular.</P>
    </Edge>
  </Thm>

  <Thm num="13.5" title="Orthogonal complement: dim W + dim W⊥ = n" tag="GATE">
    <Statement>For subspace W of ℝⁿ: <T src="\dim W + \dim W^\perp = n"/> and <T src="(W^\perp)^\perp = W"/>.</Statement>
    <Proof>Take orthonormal basis of W, extend to ℝⁿ via Gram–Schmidt; the additional vectors span W⊥.</Proof>
    <Intuition>Every vector decomposes uniquely as a part in W plus a part perpendicular to W.</Intuition>
    <Edge>
      <P>Four fundamental subspaces: <T src="N(A) = C(A^\top)^\perp"/> and <T src="N(A^\top) = C(A)^\perp"/>.</P>
      <P>So <T src="\mathbb{R}^n = N(A) \oplus C(A^\top)"/> and <T src="\mathbb{R}^m = N(A^\top) \oplus C(A)"/>.</P>
    </Edge>
  </Thm>

  <Thm num="13.6" title="QR decomposition existence" tag="GATE">
    <Statement>Every m×n matrix A with linearly independent columns can be factored as <T src="A = QR"/>, where Q has orthonormal columns (m×n) and R is upper triangular (n×n) with positive diagonal.</Statement>
    <Proof>Gram–Schmidt on the columns of A produces Q; the coefficients form R.</Proof>
    <Intuition>"Orthogonalise the columns, and record the transformation" — yields a structurally nice factorisation.</Intuition>
    <Edge>
      <P>Used to solve least squares <T src="A^\top A x = A^\top b"/> stably: <T src="R x = Q^\top b"/>.</P>
      <P>For full square A: Q is square orthogonal.</P>
    </Edge>
  </Thm>

</Cat>

{/* ═════════════════════════════════════════════════════════════
    CATEGORY 14 — DECOMPOSITIONS
    ═════════════════════════════════════════════════════════════ */}
<Cat id="cat-decomp" icon="14" title="Matrix Decompositions"
  desc="LU, Cholesky, SVD, Spectral — when they exist and what they buy you"
  count={5}>

  <Thm num="14.1" title="LU decomposition (with possible row swaps → PLU)" tag="GATE">
    <Statement>Every square A admits a decomposition <T src="PA = LU"/>, where P is a permutation, L is unit lower triangular, U is upper triangular. When no row swaps are needed: A = LU.</Statement>
    <Proof>Gaussian elimination is a sequence of row operations. Multipliers form L; the result is U. Row swaps recorded in P.</Proof>
    <Intuition>Encodes the entire process of Gaussian elimination as a single matrix factorisation.</Intuition>
    <Edge>
      <P>Existence without permutation: requires all leading principal minors nonzero.</P>
      <P>Used to solve Ax = b efficiently via Ly = Pb (forward) then Ux = y (back substitution) — O(n²) once L, U known.</P>
    </Edge>
  </Thm>

  <Thm num="14.2" title="Cholesky decomposition (positive definite A)" tag="GATE">
    <Statement>Every real symmetric positive definite A has a UNIQUE factorisation <T src="A = L L^\top"/> with L lower triangular, positive diagonal.</Statement>
    <Proof>Modified LU for symmetric PD A: standard LU yields L D Lᵀ with D diagonal positive; then absorb <T src="\sqrt{D}"/> into L.</Proof>
    <Intuition>The "square root" of a PD matrix in factored triangular form — twice as fast as LU.</Intuition>
    <Edge>Requires PD; for PSD only an approximate / modified Cholesky exists.</Edge>
  </Thm>

  <Thm num="14.3" title="Spectral decomposition (symmetric A)" tag="GATE">
    <Statement>Real symmetric A: <T src="A = Q \Lambda Q^\top = \sum_{i=1}^n \lambda_i q_i q_i^\top"/>.</Statement>
    <Proof>From spectral theorem (10.3): pick orthonormal eigenbasis qᵢ; A = Q Λ Qᵀ. Expand the matrix product as a sum of outer products.</Proof>
    <Intuition>A is a sum of n rank-1 "scaled projections" — one per eigen-direction.</Intuition>
    <Edge>Foundation of PCA: ranks principal axes by descending λᵢ.</Edge>
  </Thm>

  <Thm num="14.4" title="Singular Value Decomposition (SVD)" tag="GATE">
    <Statement>EVERY m×n real matrix A can be written as <T src="A = U \Sigma V^\top"/>, where U (m×m) and V (n×n) are orthogonal, and Σ is m×n diagonal with non-negative entries <T src="\sigma_1 \geq \sigma_2 \geq \cdots \geq 0"/> (singular values).</Statement>
    <Proof>Apply spectral theorem to symmetric <T src="A^\top A"/>: eigenvalues are <T src="\sigma_i^2 \geq 0"/>. Define V from eigenvectors of AᵀA, U from <T src="u_i = A v_i / \sigma_i"/> for nonzero σ's.</Proof>
    <Intuition>Any linear map = rotate (Vᵀ), then stretch along axes (Σ), then rotate (U). Universal factorisation.</Intuition>
    <Edge>
      <P><B>Works for ANY matrix</B> — square, rectangular, singular, full rank.</P>
      <P>Singular values <T src="\sigma_i = \sqrt{\lambda_i(A^\top A)}"/>.</P>
      <P>rank(A) = number of nonzero singular values.</P>
      <P>Best rank-k approximation: truncate Σ to top k σ's (Eckart–Young theorem).</P>
    </Edge>
  </Thm>

  <Thm num="14.5" title="Schur decomposition (any square A)" tag="GATE">
    <Statement>Every n×n complex A can be written as <T src="A = U T U^*"/> with U unitary and T upper triangular.</Statement>
    <Proof>See 10.5.</Proof>
    <Intuition>Even non-diagonalisable matrices can be put into triangular form via a unitary change of basis.</Intuition>
    <Edge>Diagonal entries of T are exactly the eigenvalues. Often used as a base for QR-algorithm eigenvalue computation.</Edge>
  </Thm>

</Cat>

{/* ═════════════════════════════════════════════════════════════
    CATEGORY 15 — QUADRATIC FORMS & INEQUALITIES
    ═════════════════════════════════════════════════════════════ */}
<Cat id="cat-qf" icon="15" title="Quadratic Forms & Norms"
  desc="Rayleigh quotient, Cauchy–Schwarz, definiteness classification"
  count={5}>

  <Thm num="15.1" title="Rayleigh quotient bounds" tag="GATE">
    <Statement>For real symmetric A: <BT src={String.raw`\lambda_{\min}(A) \leq \frac{x^\top A x}{x^\top x} \leq \lambda_{\max}(A) \quad \forall x \neq 0.`}/>
      Equalities attained when x is the corresponding eigenvector.</Statement>
    <Proof>Diagonalise A = QΛQᵀ. Let y = Qᵀx. Then <T src="\frac{x^\top A x}{x^\top x} = \frac{\sum \lambda_i y_i^2}{\sum y_i^2}"/>, which is a convex combination of eigenvalues → bounded by min and max λ.</Proof>
    <Intuition>The "stretching ratio" of A on direction x is at most λ_max and at least λ_min.</Intuition>
    <Edge>
      <P>Gives variational characterisation of eigenvalues — fundamental in optimisation, PCA, physics.</P>
      <P>Min-max theorem (Courant-Fischer): all eigenvalues are min-max of Rayleigh quotients over subspaces.</P>
    </Edge>
  </Thm>

  <Thm num="15.2" title="Cauchy–Schwarz inequality" tag="CORE">
    <Statement>For u, v ∈ ℝⁿ: <BT src={String.raw`|\langle u, v\rangle| \leq \|u\| \cdot \|v\|,`}/> with equality iff u, v are linearly dependent.</Statement>
    <Proof>Consider <T src="\|u - tv\|^2 \geq 0"/> as a quadratic in t. Discriminant ≤ 0 gives the inequality.</Proof>
    <Intuition>The dot product is bounded by the product of magnitudes — angle between vectors has |cos θ| ≤ 1.</Intuition>
    <Edge>Equivalent to triangle inequality <T src="\|u + v\| \leq \|u\| + \|v\|"/>.</Edge>
  </Thm>

  <Thm num="15.3" title="Sylvester's criterion for positive definiteness" tag="GATE">
    <Statement>Real symmetric A is positive definite iff ALL LEADING PRINCIPAL MINORS are POSITIVE.</Statement>
    <Proof>Use induction: leading 1×1 minor positive ⇒ a₁₁ &gt; 0; inductive Cholesky construction shows all minors positive ⇔ all "pivots" positive ⇔ all eigenvalues positive.</Proof>
    <Intuition>Each successive minor being positive guarantees one more positive eigenvalue is being added.</Intuition>
    <Edge>
      <P>FAILS for PSD (need all principal minors, not just leading ones).</P>
      <P>For PSD: ALL principal minors ≥ 0 (not just leading).</P>
    </Edge>
  </Thm>

  <Thm num="15.4" title="Signature / inertia of a quadratic form" tag="GATE">
    <Statement>The numbers <T src="(n_+, n_-, n_0)"/> = (positive eigenvalues, negative eigenvalues, zero eigenvalues) of a real symmetric A are INVARIANT under congruence transformations <T src="A \to P^\top A P"/> with P invertible.</Statement>
    <Proof>Sylvester's law of inertia: change of basis via congruence preserves the signs of eigenvalues even though magnitudes change.</Proof>
    <Intuition>The "geometry" of the quadratic form (how many directions go up, down, are flat) is invariant.</Intuition>
    <Edge>
      <P>PD: <T src="(n, 0, 0)"/>. PSD: <T src="(r, 0, n - r)"/>. ND: <T src="(0, n, 0)"/>. Indefinite: <T src="n_+ &gt; 0"/> AND <T src="n_- &gt; 0"/>.</P>
    </Edge>
  </Thm>

  <Thm num="15.5" title="Norm equivalence on finite-dimensional spaces" tag="GATE">
    <Statement>Any two norms on a finite-dim vector space are equivalent: there exist constants c, C &gt; 0 with <T src="c\|x\|_1 \leq \|x\|_2 \leq C \|x\|_1"/> for all x.</Statement>
    <Proof>WLOG one of the norms is Euclidean. The unit sphere of the other norm is compact in Euclidean topology → continuous functions (the norms) attain min/max → ratio is bounded.</Proof>
    <Intuition>In finite dimensions, all "reasonable" notions of size are comparable up to scaling.</Intuition>
    <Edge>FAILS in infinite-dim spaces — different norms can give genuinely different topologies.</Edge>
  </Thm>

</Cat>

{/* ═════════════════════════════════════════════════════════════
    CATEGORY 16 — LEAST SQUARES & PSEUDOINVERSE
    ═════════════════════════════════════════════════════════════ */}
<Cat id="cat-ls" icon="16" title="Least Squares & Pseudoinverse"
  desc="Best approximate solution when Ax = b has no exact answer"
  count={4}>

  <Thm num="16.1" title="Normal equations" tag="GATE">
    <Statement>The least-squares minimiser of <T src="\|Ax - b\|^2"/> is any solution of the NORMAL EQUATIONS
      <BT src={String.raw`A^\top A \,\hat{x} = A^\top b.`}/></Statement>
    <Proof>
      <P>Geometric: <T src="\hat{x}"/> minimises distance iff <T src="A\hat{x}"/> is the orthogonal projection of b onto C(A), iff <T src="A^\top(A\hat{x} - b) = 0"/>.</P>
      <P>Calculus: gradient of <T src="\|Ax - b\|^2"/> equals <T src="2 A^\top (Ax - b)"/>; setting to zero gives the result.</P>
    </Proof>
    <Intuition>Project b onto C(A); the corresponding x is least squares solution. Residual is perpendicular to C(A).</Intuition>
    <Edge>
      <P>If A has full COLUMN rank, <T src="A^\top A"/> is invertible and <T src="\hat{x} = (A^\top A)^{-1} A^\top b"/> is UNIQUE.</P>
      <P>If A rank deficient: infinitely many minimisers; minimum-norm solution chosen via pseudoinverse (16.2).</P>
    </Edge>
  </Thm>

  <Thm num="16.2" title="Moore–Penrose pseudoinverse A⁺" tag="GATE">
    <Statement>For any m×n matrix A, there is a UNIQUE n×m matrix A⁺ satisfying the four Penrose conditions:
      <ol>
        <li><T src="A A^+ A = A"/></li>
        <li><T src="A^+ A A^+ = A^+"/></li>
        <li><T src="(AA^+)^\top = AA^+"/></li>
        <li><T src="(A^+ A)^\top = A^+ A"/></li>
      </ol>
      Explicitly via SVD: if <T src="A = U \Sigma V^\top"/>, then <T src="A^+ = V \Sigma^+ U^\top"/>, where Σ⁺ is Σᵀ with non-zero σᵢ reciprocated.</Statement>
    <Proof>Existence via SVD construction. Uniqueness from the four axioms via algebraic manipulation.</Proof>
    <Intuition>A⁺ generalises A⁻¹ to non-square / singular matrices. Behaves like the "best possible inverse".</Intuition>
    <Edge>
      <P>If A invertible: A⁺ = A⁻¹.</P>
      <P>If A has full column rank: <T src="A^+ = (A^\top A)^{-1} A^\top"/>.</P>
      <P>If A has full row rank: <T src="A^+ = A^\top (A A^\top)^{-1}"/>.</P>
    </Edge>
  </Thm>

  <Thm num="16.3" title="Minimum-norm least squares solution" tag="GATE">
    <Statement>Among all least squares minimisers, the one with the SMALLEST norm is <T src="\hat{x} = A^+ b"/>.</Statement>
    <Proof>The general least squares solution is <T src="\hat{x} = A^+ b + (\text{anything in } N(A))"/>. The component in N(A) is orthogonal to A⁺b (since A⁺b ∈ row space of A). Pythagoras → minimum norm achieved when null-space component is zero.</Proof>
    <Intuition>The pseudoinverse picks the "cleanest" answer: shortest x that fits as well as possible.</Intuition>
    <Edge>Always exists, even when normal equations have no unique solution.</Edge>
  </Thm>

  <Thm num="16.4" title="Projection matrix P = A(AᵀA)⁻¹Aᵀ" tag="GATE">
    <Statement>For A with full column rank, the orthogonal projection onto C(A) is given by the matrix <T src="P = A(A^\top A)^{-1} A^\top"/>. This P is symmetric and idempotent.</Statement>
    <Proof>
      <P>Symmetry: <T src="P^\top = (A^\top)^\top ((A^\top A)^{-1})^\top A^\top = A(A^\top A)^{-1} A^\top = P"/>.</P>
      <P>Idempotent: <T src="P^2 = A(A^\top A)^{-1} A^\top \cdot A(A^\top A)^{-1} A^\top = A(A^\top A)^{-1}(A^\top A)(A^\top A)^{-1} A^\top = A(A^\top A)^{-1} A^\top = P"/>.</P>
    </Proof>
    <Intuition>"Hat matrix" in regression — turns observations into fitted values.</Intuition>
    <Edge>
      <P>P projects onto C(A); I − P projects onto N(Aᵀ) (the orthogonal complement).</P>
      <P>rank(P) = trace(P) = rank(A).</P>
    </Edge>
  </Thm>

</Cat>

    </div>
  );
}
