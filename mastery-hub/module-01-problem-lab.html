<script type="text/template" id="m1-source-of-truth" data-no-execute>
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ════════════════════════════════════════════════════════════════
   PROBLEM LAB — SHARED COMPONENTS & STATE
   ════════════════════════════════════════════════════════════════ */

const MODULE_NUM = 1;

/* localStorage helpers ─────────────────────────────────────────── */
const lsGet = (k, fallback) => {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
};
const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

function useConceptProgress(conceptNum, totalProblems) {
  const aKey = "gate_la_m" + MODULE_NUM + "_c" + conceptNum + "_attempted";
  const cKey = "gate_la_m" + MODULE_NUM + "_c" + conceptNum + "_correct";
  const hKey = "gate_la_m" + MODULE_NUM + "_c" + conceptNum + "_hints";

  const [attempted, setAttempted] = useState(() => lsGet(aKey, []));
  const [correct, setCorrect] = useState(() => lsGet(cKey, []));
  const [hints, setHints] = useState(() => lsGet(hKey, {}));

  const markAttempt = (pid, didCorrect) => {
    setAttempted(prev => {
      if (prev.includes(pid)) return prev;
      const next = [...prev, pid]; lsSet(aKey, next); return next;
    });
    if (didCorrect) {
      setCorrect(prev => {
        if (prev.includes(pid)) return prev;
        const next = [...prev, pid]; lsSet(cKey, next); return next;
      });
    }
  };
  const useHint = (pid) => {
    setHints(prev => {
      const next = { ...prev, [pid]: (prev[pid] || 0) + 1 };
      lsSet(hKey, next);
      return next;
    });
  };
  return { attempted, correct, hints, markAttempt, useHint, totalProblems };
}

/* ────────────────────────────────────────────────────────────────
   BADGES (Difficulty, Type, Time, Tags)
   ──────────────────────────────────────────────────────────────── */
function DiffBadge({ level }) {
  const labels = { easy: "EASY", medium: "MEDIUM", hard: "HARD", killer: "KILLER" };
  return (
    <span className={"text-[10.5px] tracking-[0.15em] font-bold px-2 py-1 rounded-md pl-difficulty-" + level}>
      {labels[level]}
    </span>
  );
}
function TypeBadge({ type }) {
  if (type === "pyq") return <span className="text-[10.5px] tracking-[0.15em] font-bold px-2 py-1 rounded-md pl-type-pyq">★ GATE PYQ</span>;
  return (
    <span className={"text-[10.5px] tracking-[0.15em] font-bold px-2 py-1 rounded-md pl-type-" + type}>
      {type === "mcq" ? "MCQ" : "NAT"}
    </span>
  );
}
function MetaPill({ children, mono = false }) {
  return (
    <span className={"text-[11px] px-2 py-1 rounded-md " + (mono ? "font-mono " : "")}
      style={{background: "var(--bg-elev-3)", color: "var(--text-dim)", border: "1px solid var(--border)"}}>
      {children}
    </span>
  );
}
function ConceptTag({ children }) {
  return (
    <span className="text-[11px] px-2 py-1 rounded-md font-mono"
      style={{background: "var(--accent-soft)", color: "var(--accent)", border: "1px solid var(--accent-border)"}}>
      {children}
    </span>
  );
}

/* ────────────────────────────────────────────────────────────────
   LAYER HEADER
   ──────────────────────────────────────────────────────────────── */
function LayerHeader({ num, title, subtitle }) {
  return (
    <div className="mt-10 mb-5">
      <div className="pl-layer-header">
        <div className="pl-layer-num">L{num}</div>
        <div className="pl-layer-title">{title}</div>
      </div>
      {subtitle && <div className="text-[14px] ml-12" style={{color: "var(--text-dim)"}}>{subtitle}</div>}
    </div>

}

/* ────────────────────────────────────────────────────────────────
   PATTERN CARD (Layer 1)
   ──────────────────────────────────────────────────────────────── */
function PatternCard({ idx, pattern }) {
  return (
    <div className="rounded-xl p-5 mb-4 pl-prose"
      style={{background: "var(--bg-elev-1)", border: "1px solid var(--border)"}}>
      <div className="flex flex-wrap items-baseline gap-3 mb-3">
        <span className="text-[10.5px] tracking-[0.18em] font-bold px-2 py-1 rounded-md"
          style={{background: "var(--accent-soft)", color: "var(--accent)", border: "1px solid var(--accent-border)"}}>
          PATTERN {idx}
        </span>
        <span className="text-[17px] font-semibold" style={{color: "var(--text)"}}>{pattern.name}</span>
        <span className="ml-auto text-[11px] px-2 py-1 rounded-md font-mono"
          style={{background: "var(--bg-elev-3)", color: "var(--text-dim)", border: "1px solid var(--border)"}}>
          ⏱ ~{pattern.timeBudget}s
        </span>
        <span className="text-[11px] px-2 py-1 rounded-md"
          style={{background: pattern.frequency === "Very Frequent" ? "rgba(239,68,68,0.12)" :
                                pattern.frequency === "Frequent" ? "rgba(249,115,22,0.12)" :
                                pattern.frequency === "Occasional" ? "rgba(234,179,8,0.12)" : "rgba(148,163,184,0.12)",
                  color: pattern.frequency === "Very Frequent" ? "#ef4444" :
                         pattern.frequency === "Frequent" ? "#f97316" :
                         pattern.frequency === "Occasional" ? "#eab308" : "#94a3b8",
                  border: "1px solid currentColor"}}>
          {pattern.frequency}
        </span>
      </div>

      <div className="grid md:grid-cols-2 gap-3 text-[13.5px] leading-relaxed">
        <div className="rounded-lg p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent-2)"}}>SURFACE APPEARANCE</div>
          <div style={{color: "var(--text)"}}>{pattern.surface}</div>
        </div>
        <div className="rounded-lg p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--pink)"}}>WHAT IT'S ACTUALLY TESTING</div>
          <div style={{color: "var(--text)"}}>{pattern.testing}</div>
        </div>
      </div>

      <div className="mt-3 rounded-lg p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
        <div className="text-[10px] tracking-[0.18em] font-semibold mb-2" style={{color: "var(--warn)"}}>SIGNAL WORDS</div>
        <div className="flex flex-wrap gap-2">
          {pattern.signals.map((s, i) => (
            <code key={i} className="font-mono text-[12px] px-2 py-1 rounded"
              style={{background: "var(--bg-elev-3)", color: "var(--warn)", border: "1px solid var(--warn-border)"}}>
              {s}
            </code>
          ))}
        </div>
      </div>

      <div className="mt-3 rounded-lg p-3" style={{background: "var(--accent-soft)", border: "1px solid var(--accent-border)"}}>
        <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent)"}}>FIRST MOVE (TOP-RANKER REFLEX)</div>
        <div className="text-[14px]" style={{color: "var(--text)"}}>{pattern.firstMove}</div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────────
   PROBLEM CARD (Layer 2)
   ──────────────────────────────────────────────────────────────── */
function ProblemCard({ p, idx, progress }) {
  const [selected, setSelected] = useState(null);
  const [natValue, setNatValue] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [attempts, setAttempts] = useState(0);
  const [hintsShown, setHintsShown] = useState(0);
  const [showFullSolution, setShowFullSolution] = useState(false);
  const [flashKey, setFlashKey] = useState(0);

  const isPYQ = p.type === "pyq";

  const checkAnswer = () => {
    let ok = false;
    if (p.kind === "mcq") {
      ok = selected === p.answer;
    } else {
      const userVal = parseFloat(natValue);
      if (!isNaN(userVal)) {
        const tol = p.tolerance != null ? p.tolerance : 0.01;
        ok = Math.abs(userVal - p.answer) <= tol;
      }
    }
    setIsCorrect(ok);
    setSubmitted(true);
    setAttempts(a => a + 1);
    setFlashKey(k => k + 1);
    progress.markAttempt(p.id, ok);
    if (!ok && attempts + 1 >= 2) setShowFullSolution(true);
  };

  const tryAgain = () => {
    setSubmitted(false);
    setIsCorrect(false);
    setSelected(null);
    setNatValue("");
  };

  const revealHint = () => {
    if (hintsShown < (p.hints?.length || 0)) {
      setHintsShown(hintsShown + 1);
      progress.useHint(p.id);
    }
  };

  const isCompleted = progress.correct.includes(p.id);

  return (
    <div key={flashKey} className={"rounded-xl p-5 mb-5 " + (submitted ? (isCorrect ? "pl-correct" : "pl-wrong") : "")}
      style={{background: "var(--bg-elev-1)", border: "1px solid " + (isCompleted ? "rgba(34,197,94,0.4)" : "var(--border)")}}>

      <div className="flex flex-wrap items-center gap-2 mb-3">
        <span className="text-[10.5px] tracking-[0.18em] font-bold px-2 py-1 rounded-md font-mono"
          style={{background: "var(--bg-elev-3)", color: "var(--text-dim)", border: "1px solid var(--border)"}}>
          Q{idx}
        </span>
        <DiffBadge level={p.difficulty} />
        <TypeBadge type={isPYQ ? "pyq" : p.kind} />
        {isPYQ && p.pyqYear && (
          <MetaPill mono>GATE CS {p.pyqYear}</MetaPill>
        )}
        <MetaPill>{p.marks}-mark style</MetaPill>
        <MetaPill mono>⏱ ~{p.timeTarget}s</MetaPill>
        {isCompleted && (
          <span className="text-[10.5px] tracking-[0.18em] font-bold px-2 py-1 rounded-md ml-auto"
            style={{background: "rgba(34,197,94,0.15)", color: "#22c55e", border: "1px solid rgba(34,197,94,0.4)"}}>
            ✓ SOLVED
          </span>
        )}
      </div>

      <div className="flex flex-wrap gap-2 mb-3">
        {p.tags.map((t, i) => <ConceptTag key={i}>{t}</ConceptTag>)}
      </div>

      {p.kind === "mcq" && (
        <div className="pl-neg-banner mb-3">
          ⚠ Negative marking: −1/3 mark for wrong answer
        </div>
      )}
      {p.skipSignal && (
        <div className="mb-3">
          <span className={p.skipSignal.type === "attempt" ? "pl-skip-attempt" : "pl-skip-skip"}>
            {p.skipSignal.type === "attempt" ? "✓ " : "💡 "}{p.skipSignal.text}
          </span>
        </div>
      )}

      <div className="text-[15px] leading-relaxed mb-4 p-4 rounded-lg pl-prose"
        style={{background: "var(--bg-elev-2)", color: "var(--text)", border: "1px solid var(--border)"}}>
        {p.statement}
      </div>

      {/* ANSWER UI */}
      {p.kind === "mcq" ? (
        <div className="space-y-2 mb-3">
          {p.options.map((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            let cls = "pl-option-btn";
            if (!submitted && selected === letter) cls += " selected";
            if (submitted) {
              if (letter === p.answer) cls += " correct";
              else if (letter === selected) cls += " wrong-choice";
            }
            return (
              <button key={i}
                className={cls}
                disabled={submitted}
                onClick={() => setSelected(letter)}>
                <span className="pl-option-letter">{letter}</span>
                <span className="flex-1">{opt}</span>
                {submitted && letter === p.answer && <span style={{color: "#22c55e"}}>✓</span>}
                {submitted && letter === selected && letter !== p.answer && <span style={{color: "#fb7185"}}>✗</span>}
              </button>
            );
          })}
        </div>
      ) : (
        <div className="mb-3">
          <label className="text-[12px] mb-1 block" style={{color: "var(--text-dim)"}}>Numerical Answer (NAT — no options)</label>
          <input type="number" step="any" className="pl-nat-input"
            value={natValue}
            disabled={submitted}
            onChange={e => setNatValue(e.target.value)}
            placeholder="Enter your answer..." />
        </div>
      )}

      {/* SUBMIT */}
      {!submitted && (
        <div className="flex items-center gap-3">
          <button className="pl-submit-btn"
            disabled={p.kind === "mcq" ? !selected : natValue === ""}
            onClick={checkAnswer}>
            Submit Answer
          </button>
          {hintsShown > 0 && (
            <span className="text-[11px]" style={{color: "var(--text-dim)"}}>
              Hints used: {hintsShown}/{p.hints?.length || 0}
            </span>
          )}
          {p.hints && p.hints.length > 0 && hintsShown < p.hints.length && (
            <button className="text-[13px] px-3 py-1.5 rounded-md transition-colors"
              style={{border: "1px solid var(--accent-2-border)", color: "var(--accent-2)", background: "var(--accent-2-soft)"}}
              onClick={revealHint}>
              Show Hint {hintsShown + 1}
            </button>
          )}
        </div>
      )}

      {/* HINTS DISPLAYED */}
      {hintsShown > 0 && !submitted && (
        <div className="mt-4 space-y-2">
          {p.hints.slice(0, hintsShown).map((h, i) => (
            <div key={i} className="pl-hint-box pl-prose">
              <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent-2)"}}>
                HINT {i+1} · {h.label}
              </div>
              <div className="text-[14px]">{h.text}</div>
            </div>
          ))}
        </div>
      )}

      {/* AFTER SUBMISSION */}
      {submitted && (
        <div className="mt-4">
          <div className="flex flex-wrap items-center gap-3 mb-3">
            {isCorrect ? (
              <span className="text-[12px] tracking-[0.15em] font-bold px-3 py-1.5 rounded-md"
                style={{background: "rgba(34,197,94,0.15)", color: "#22c55e", border: "1px solid rgba(34,197,94,0.4)"}}>
                ✓ CORRECT
              </span>
            ) : (
              <span className="text-[12px] tracking-[0.15em] font-bold px-3 py-1.5 rounded-md"
                style={{background: "rgba(239,68,68,0.15)", color: "#fb7185", border: "1px solid rgba(239,68,68,0.4)"}}>
                ✗ INCORRECT
              </span>
            )}
            {!isCorrect && (
              <>
                <button className="text-[13px] px-3 py-1.5 rounded-md"
                  style={{border: "1px solid var(--accent-border)", color: "var(--accent)", background: "var(--accent-soft)"}}
                  onClick={tryAgain}>
                  Try Again
                </button>
                {p.hints && p.hints.length > 0 && hintsShown < p.hints.length && !showFullSolution && (
                  <button className="text-[13px] px-3 py-1.5 rounded-md"
                    style={{border: "1px solid var(--accent-2-border)", color: "var(--accent-2)", background: "var(--accent-2-soft)"}}
                    onClick={() => { revealHint(); setSubmitted(false); }}>
                    Show Hint
                  </button>
                )}
                {!showFullSolution && attempts >= 2 && (
                  <button className="text-[13px] px-3 py-1.5 rounded-md"
                    style={{border: "1px solid var(--danger-border)", color: "var(--danger)", background: "var(--danger-soft)"}}
                    onClick={() => setShowFullSolution(true)}>
                    Show Full Solution
                  </button>
                )}
                {!showFullSolution && (
                  <button className="text-[13px] px-3 py-1.5 rounded-md"
                    style={{border: "1px solid var(--border-strong)", color: "var(--text-dim)", background: "var(--bg-elev-2)"}}
                    onClick={() => setShowFullSolution(true)}>
                    Reveal Solution
                  </button>
                )}
              </>
            )}
          </div>

          {(isCorrect || showFullSolution) && (
            <SolutionPanel p={p} wasCorrect={isCorrect} />
          )}
        </div>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────────────────────────
   MISTAKE CARD (Layer 4) with Spot-the-Error mode
   ──────────────────────────────────────────────────────────────── */
function MistakeCard({ mistake, idx }) {
  const [mode, setMode] = useState("read"); // "read" | "spot"
  const [clickedLine, setClickedLine] = useState(null);
  const [showFull, setShowFull] = useState(false);

  return (
    <div className="pl-mistake-card mb-4 pl-prose">
      <div className="flex flex-wrap items-baseline gap-3 mb-3">
        <span className="text-[10.5px] tracking-[0.15em] font-bold px-2 py-1 rounded-md"
          style={{background: "var(--danger-soft)", color: "var(--danger)", border: "1px solid var(--danger-border)"}}>
          MISTAKE {idx}
        </span>
        <div className="text-[17px] font-semibold" style={{color: "var(--text)"}}>{mistake.name}</div>
        <span className="text-[11px] px-2 py-1 rounded-md ml-auto"
          style={{background: mistake.frequency === "Very Common" ? "rgba(239,68,68,0.12)" :
                              mistake.frequency === "Common" ? "rgba(249,115,22,0.12)" : "rgba(148,163,184,0.12)",
                  color: mistake.frequency === "Very Common" ? "#ef4444" :
                         mistake.frequency === "Common" ? "#f97316" : "#94a3b8",
                  border: "1px solid currentColor"}}>
          {mistake.frequency}
        </span>
      </div>

      <div className="flex gap-2 mb-3">
        <button className={"pl-tab-pill " + (mode === "read" ? "active" : "")}
          onClick={() => setMode("read")}>📖 Read</button>
        <button className={"pl-tab-pill " + (mode === "spot" ? "active" : "")}
          onClick={() => { setMode("spot"); setClickedLine(null); setShowFull(false); }}>🎯 Spot the Error</button>
      </div>

      {mode === "read" && (
        <>
          <div className="mb-3">
            <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--danger)"}}>WRONG SOLUTION (looks plausible)</div>
            <div className="pl-wrong-solution">
              {mistake.wrong.map((line, i) => (
                <div key={i} className={i === mistake.errorLine ? "error-found" : ""} style={{padding: "2px 4px"}}>
                  <span style={{color: "var(--text-faded)", marginRight: 8}}>{(i+1).toString().padStart(2, " ")}.</span>
                  {line}
                </div>
              ))}
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-3">
            <div className="rounded-lg p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--danger-border)"}}>
              <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--danger)"}}>📍 ERROR LOCATION</div>
              <div className="text-[13.5px]" style={{color: "var(--text)"}}>Line {mistake.errorLine + 1}: {mistake.errorDescription}</div>
            </div>
            <div className="rounded-lg p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--warn-border)"}}>
              <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--warn)"}}>🧠 ROOT CAUSE</div>
              <div className="text-[13.5px]" style={{color: "var(--text)"}}>{mistake.rootCause}</div>
            </div>
          </div>

          <div className="mt-3 rounded-lg p-3" style={{background: "var(--accent-3-soft)", border: "1px solid var(--accent-3-border)"}}>
            <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent-3)"}}>✅ CORRECT REASONING</div>
            <div className="text-[13.5px]" style={{color: "var(--text)"}}>{mistake.correct}</div>
          </div>

          <div className="mt-3 rounded-lg p-3" style={{background: "var(--accent-soft)", border: "1px solid var(--accent-border)"}}>
            <div className="text-[10px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent)"}}>🛡 PREVENTION RULE (memorize this)</div>
            <div className="text-[13.5px] italic" style={{color: "var(--text)"}}>{mistake.prevention}</div>
          </div>

          <div className="mt-3 flex gap-2 text-[12px]" style={{color: "var(--text-dim)"}}>
            <span className="px-2 py-1 rounded-md" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
              💸 GATE Cost: {mistake.gateCost}
            </span>
          </div>
        </>
      )}

      {mode === "spot" && (
        <>
          <div className="mb-2 text-[13px]" style={{color: "var(--text-dim)"}}>
            👉 Click the line where you think the reasoning breaks.
          </div>
          <div className="pl-wrong-solution">
            {mistake.wrong.map((line, i) => {
              let cls = "pl-wrong-line";
              if (clickedLine === i) {
                if (i === mistake.errorLine) cls += " error-found";
                else cls += "";
              }
              if (showFull && i === mistake.errorLine) cls += " error-found";
              return (
                <div key={i} className={cls}
                  onClick={() => { if (clickedLine === null) { setClickedLine(i); setShowFull(true); } }}>
                  <span style={{color: "var(--text-faded)", marginRight: 8}}>{(i+1).toString().padStart(2, " ")}.</span>
                  {line}
                  {showFull && i === mistake.errorLine && <span style={{color: "#fb7185", marginLeft: 8, fontWeight: 600}}>← ERROR HERE</span>}
                </div>
              );
            })}
          </div>
          {clickedLine !== null && (
            <div className="mt-3 rounded-lg p-3"
              style={{background: clickedLine === mistake.errorLine ? "var(--accent-3-soft)" : "var(--danger-soft)",
                      border: "1px solid " + (clickedLine === mistake.errorLine ? "var(--accent-3-border)" : "var(--danger-border)")}}>
              {clickedLine === mistake.errorLine ? (
                <div className="text-[13.5px]" style={{color: "#22c55e"}}>
                  ✓ Correct! You spotted the error on line {mistake.errorLine + 1}: {mistake.errorDescription}
                </div>
              ) : (
                <div className="text-[13.5px]" style={{color: "var(--danger)"}}>
                  ✗ Not quite. The actual error is on line {mistake.errorLine + 1}: {mistake.errorDescription}
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────────────────────────
   DRILL MODE (Layer 5)
   ──────────────────────────────────────────────────────────────── */
function DrillMode({ conceptNum, conceptTitle, problems }) {
  const TARGETS = { easy: 40, medium: 75, hard: 120, killer: 150 };
  const lsKey = "gate_la_m" + MODULE_NUM + "_c" + conceptNum + "_drill_best";
  const streakKey = "gate_la_m" + MODULE_NUM + "_c" + conceptNum + "_drill_streak";

  const [phase, setPhase] = useState("idle"); // idle | running | review
  const [drill, setDrill] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [results, setResults] = useState([]);
  const [timeLeft, setTimeLeft] = useState(0);
  const [questionStart, setQuestionStart] = useState(0);
  const [selected, setSelected] = useState(null);
  const [natVal, setNatVal] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [paused, setPaused] = useState(false);
  const [bestRecord] = useState(() => lsGet(lsKey, null));
  const [streak] = useState(() => lsGet(streakKey, 0));

  const startDrill = () => {
    const shuffled = [...problems].sort(() => Math.random() - 0.5).slice(0, 5);
    setDrill(shuffled);
    setCurrentIdx(0);
    setResults([]);
    setSelected(null);
    setNatVal("");
    setFeedback(null);
    const first = shuffled[0];
    setTimeLeft(TARGETS[first.difficulty] || 60);
    setQuestionStart(Date.now());
    setPhase("running");
  };

  useEffect(() => {
    if (phase !== "running" || paused || feedback) return;
    if (timeLeft <= 0) {
      submitDrill(false, "timeout");
      return;
    }
    const t = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft, paused, feedback]);

  const submitDrill = (didAnswer, mode) => {
    const p = drill[currentIdx];
    const elapsed = Math.round((Date.now() - questionStart) / 1000);
    let isCorrect = false;
    if (didAnswer) {
      if (p.kind === "mcq") isCorrect = selected === p.answer;
      else {
        const v = parseFloat(natVal);
        if (!isNaN(v)) {
          const tol = p.tolerance != null ? p.tolerance : 0.01;
          isCorrect = Math.abs(v - p.answer) <= tol;
        }
      }
    }
    setResults(r => [...r, {
      problem: p, correct: isCorrect, time: elapsed, target: TARGETS[p.difficulty] || 60,
      answer: p.kind === "mcq" ? selected : natVal, mode,
    }]);
    setFeedback({ correct: isCorrect, answer: p.answer });
  };

  const nextQuestion = () => {
    if (currentIdx + 1 >= drill.length) {
      finalize();
      return;
    }
    const nextI = currentIdx + 1;
    setCurrentIdx(nextI);
    setSelected(null);
    setNatVal("");
    setFeedback(null);
    setTimeLeft(TARGETS[drill[nextI].difficulty] || 60);
    setQuestionStart(Date.now());
  };

  const finalize = () => {
    setPhase("review");
    const correctCount = results.filter(r => r.correct).length;
    const total = results.length;
    const acc = total > 0 ? Math.round((correctCount/total) * 100) : 0;
    const avgTime = total > 0 ? Math.round(results.reduce((s, r) => s + r.time, 0) / total) : 0;
    const nm = results.reduce((s, r) => {
      if (r.problem.kind !== "mcq") return s;
      if (r.correct) return s + (r.problem.marks === 2 ? 2 : 1);
      if (r.answer == null) return s;
      return s - (r.problem.marks === 2 ? 2/3 : 1/3);
    }, 0);

    if (!bestRecord || acc > bestRecord.accuracy || (acc === bestRecord.accuracy && avgTime < bestRecord.avgTime)) {
      lsSet(lsKey, { score: correctCount, accuracy: acc, avgTime, when: Date.now() });
    }
    const lastStreak = results.length > 0 ? results[results.length-1].correct : false;
    const newStreak = lastStreak ? streak + correctCount : 0;
    lsSet(streakKey, Math.max(streak, newStreak));
  };

  const progressPct = phase === "running" && drill[currentIdx] ? (timeLeft / (TARGETS[drill[currentIdx].difficulty] || 60)) * 100 : 0;
  const progressClass = progressPct < 25 ? "danger" : progressPct < 50 ? "warning" : "";

  if (phase === "idle") {
    return (
      <div className="rounded-xl p-6" style={{background: "var(--bg-elev-1)", border: "1px solid var(--border)"}}>
        <div className="flex items-center gap-3 mb-3">
          <div className="text-[24px]">⏱</div>
          <div>
            <div className="text-[18px] font-semibold" style={{color: "var(--text)"}}>Drill Mode — {conceptTitle}</div>
            <div className="text-[13px]" style={{color: "var(--text-dim)"}}>5 rapid-fire questions · timed · instant feedback only</div>
          </div>
        </div>

        <div className="grid md:grid-cols-4 gap-3 my-4 text-[12px]">
          <div className="rounded-md p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
            <div style={{color: "var(--text-dim)"}}>Easy target</div>
            <div className="font-mono font-semibold mt-1" style={{color: "#22c55e"}}>40 sec</div>
          </div>
          <div className="rounded-md p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
            <div style={{color: "var(--text-dim)"}}>Medium target</div>
            <div className="font-mono font-semibold mt-1" style={{color: "#eab308"}}>75 sec</div>
          </div>
          <div className="rounded-md p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
            <div style={{color: "var(--text-dim)"}}>Hard target</div>
            <div className="font-mono font-semibold mt-1" style={{color: "#f97316"}}>120 sec</div>
          </div>
          <div className="rounded-md p-3" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
            <div style={{color: "var(--text-dim)"}}>Killer target</div>
            <div className="font-mono font-semibold mt-1" style={{color: "#ef4444"}}>150 sec</div>
          </div>
        </div>

        {bestRecord && (
          <div className="rounded-lg p-3 mb-3" style={{background: "var(--accent-3-soft)", border: "1px solid var(--accent-3-border)"}}>
            <div className="text-[11px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--accent-3)"}}>🏆 PERSONAL BEST</div>
            <div className="text-[13.5px]" style={{color: "var(--text)"}}>
              Score: {bestRecord.score}/5 · Accuracy: {bestRecord.accuracy}% · Avg time: {bestRecord.avgTime}s
            </div>
          </div>
        )}

        {streak > 0 && (
          <div className="rounded-lg p-3 mb-3" style={{background: "var(--warn-soft)", border: "1px solid var(--warn-border)"}}>
            <div className="text-[11px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--warn)"}}>🔥 STREAK</div>
            <div className="text-[13.5px]" style={{color: "var(--text)"}}>Best streak: {streak} consecutive correct under time</div>
          </div>
        )}

        <button className="pl-submit-btn" onClick={startDrill}>
          ▶ Start Drill (5 questions)
        </button>
      </div>
    );
  }

  if (phase === "running") {
    const p = drill[currentIdx];
    return (
      <div className="rounded-xl p-6" style={{background: "var(--bg-elev-1)", border: "1px solid var(--border)"}}>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-3">
            <div className="text-[12px] tracking-[0.15em] font-bold px-2 py-1 rounded-md"
              style={{background: "var(--bg-elev-3)", color: "var(--text-dim)", border: "1px solid var(--border)"}}>
              Q {currentIdx+1} / {drill.length}
            </div>
            <DiffBadge level={p.difficulty} />
          </div>
          <div className="text-[14px] font-mono font-bold"
            style={{color: timeLeft < 20 ? "#ef4444" : timeLeft < 40 ? "#eab308" : "#22c55e"}}>
            ⏱ {timeLeft}s
          </div>
        </div>

        <div className="pl-progress-bar mb-4">
          <div className={"pl-progress-fill " + progressClass} style={{width: progressPct + "%"}}/>
        </div>

        <div className="text-[15px] leading-relaxed mb-4 p-4 rounded-lg"
          style={{background: "var(--bg-elev-2)", color: "var(--text)", border: "1px solid var(--border)"}}>
          {p.statement}
        </div>

        {!feedback && p.kind === "mcq" && (
          <div className="space-y-2 mb-3">
            {p.options.map((opt, i) => {
              const letter = String.fromCharCode(65 + i);
              return (
                <button key={i}
                  className={"pl-option-btn " + (selected === letter ? "selected" : "")}
                  onClick={() => setSelected(letter)}>
                  <span className="pl-option-letter">{letter}</span>
                  <span className="flex-1">{opt}</span>
                </button>
              );
            })}
          </div>
        )}
        {!feedback && p.kind === "nat" && (
          <input type="number" step="any" className="pl-nat-input mb-3"
            value={natVal}
            onChange={e => setNatVal(e.target.value)}
            placeholder="Enter your answer..." />
        )}

        {!feedback && (
          <div className="flex gap-2">
            <button className="pl-submit-btn"
              disabled={p.kind === "mcq" ? !selected : natVal === ""}
              onClick={() => submitDrill(true, "answered")}>
              Submit
            </button>
            <button className="text-[13px] px-3 py-1.5 rounded-md"
              style={{border: "1px solid var(--border-strong)", color: "var(--text-dim)", background: "var(--bg-elev-2)"}}
              onClick={() => submitDrill(false, "skipped")}>
              Skip
            </button>
          </div>
        )}

        {feedback && (
          <div className="rounded-lg p-3 mb-3"
            style={{background: feedback.correct ? "var(--accent-3-soft)" : "var(--danger-soft)",
                    border: "1px solid " + (feedback.correct ? "var(--accent-3-border)" : "var(--danger-border)")}}>
            <div className="text-[13.5px] font-semibold mb-1"
              style={{color: feedback.correct ? "#22c55e" : "#fb7185"}}>
              {feedback.correct ? "✓ Correct" : "✗ Incorrect"} — Answer: {String(feedback.answer)}
            </div>
            <div className="flex gap-2 mt-2">
              <button className="pl-submit-btn" onClick={nextQuestion}>
                {currentIdx + 1 >= drill.length ? "Finish Drill →" : "Next Question →"}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* phase === "review" */
  const correctCount = results.filter(r => r.correct).length;
  const total = results.length;
  const acc = total > 0 ? Math.round((correctCount/total) * 100) : 0;
  const accByDiff = {};
  ["easy", "medium", "hard", "killer"].forEach(d => {
    const dr = results.filter(r => r.problem.difficulty === d);
    if (dr.length > 0) {
      accByDiff[d] = Math.round((dr.filter(r => r.correct).length / dr.length) * 100);
    }
  });
  const nm = results.reduce((s, r) => {
    if (r.problem.kind !== "mcq") return s + (r.correct ? r.problem.marks : 0);
    if (r.correct) return s + (r.problem.marks === 2 ? 2 : 1);
    if (r.answer == null || r.mode === "skipped" || r.mode === "timeout") return s;
    return s - (r.problem.marks === 2 ? 2/3 : 1/3);
  }, 0);
  const totalMarks = results.reduce((s, r) => s + (r.problem.marks || 1), 0);
  const reviseConcepts = [...new Set(results.filter(r => !r.correct).flatMap(r => r.problem.tags))];

  return (
    <div className="rounded-xl p-6" style={{background: "var(--bg-elev-1)", border: "1px solid var(--border)"}}>
      <div className="text-[20px] font-bold mb-1" style={{color: "var(--text)"}}>📊 Drill Report Card</div>
      <div className="text-[13px] mb-4" style={{color: "var(--text-dim)"}}>5-question drill · {conceptTitle}</div>

      <div className="grid md:grid-cols-3 gap-3 mb-4">
        <div className="rounded-lg p-4" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[11px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--text-dim)"}}>SCORE</div>
          <div className="text-[24px] font-bold" style={{color: "var(--accent)"}}>{correctCount}/{total}</div>
        </div>
        <div className="rounded-lg p-4" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[11px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--text-dim)"}}>ACCURACY</div>
          <div className="text-[24px] font-bold" style={{color: acc >= 80 ? "#22c55e" : acc >= 60 ? "#eab308" : "#ef4444"}}>{acc}%</div>
        </div>
        <div className="rounded-lg p-4" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[11px] tracking-[0.18em] font-semibold mb-1" style={{color: "var(--text-dim)"}}>NEG-MARKING SIM</div>
          <div className="text-[24px] font-bold" style={{color: nm >= totalMarks * 0.7 ? "#22c55e" : nm >= 0 ? "#eab308" : "#ef4444"}}>
            {nm.toFixed(2)} / {totalMarks}
          </div>
        </div>
      </div>

      <div className="rounded-lg p-4 mb-4" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
        <div className="text-[11px] tracking-[0.18em] font-semibold mb-3" style={{color: "var(--accent-2)"}}>⏱ TIME vs TARGET (per question)</div>
        <div className="space-y-2">
          {results.map((r, i) => {
            const pct = Math.min(100, (r.time / r.target) * 100);
            const cls = pct > 100 ? "danger" : pct > 75 ? "warning" : "";
            return (
              <div key={i} className="flex items-center gap-3 text-[12px]">
                <div className="w-16 font-mono" style={{color: "var(--text-dim)"}}>Q{i+1}</div>
                <DiffBadge level={r.problem.difficulty} />
                <div className="flex-1 pl-progress-bar">
                  <div className={"pl-progress-fill " + cls} style={{width: pct + "%"}}/>
                </div>
                <div className="font-mono w-20 text-right" style={{color: "var(--text)"}}>{r.time}s / {r.target}s</div>
                <div style={{color: r.correct ? "#22c55e" : "#fb7185"}}>{r.correct ? "✓" : "✗"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {Object.keys(accByDiff).length > 0 && (
        <div className="rounded-lg p-4 mb-4" style={{background: "var(--bg-elev-2)", border: "1px solid var(--border)"}}>
          <div className="text-[11px] tracking-[0.18em] font-semibold mb-2" style={{color: "var(--accent)"}}>ACCURACY BY DIFFICULTY</div>
          <div className="flex flex-wrap gap-2">
            {Object.entries(accByDiff).map(([d, a]) => (
              <div key={d} className="flex items-center gap-2 text-[12px] px-2 py-1 rounded-md"
                style={{background: "var(--bg-elev-3)", border: "1px solid var(--border)"}}>
                <DiffBadge level={d} />
                <span className="font-mono" style={{color: a >= 80 ? "#22c55e" : a >= 60 ? "#eab308" : "#ef4444"}}>{a}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {reviseConcepts.length > 0 && (
        <div className="rounded-lg p-4 mb-4" style={{background: "var(--warn-soft)", border: "1px solid var(--warn-border)"}}>
          <div className="text-[11px] tracking-[0.18em] font-semibold mb-2" style={{color: "var(--warn)"}}>🔁 CONCEPTS TO REVISIT</div>
          <div className="flex flex-wrap gap-2">
            {reviseConcepts.map((c, i) => <ConceptTag key={i}>{c}</ConceptTag>)}
          </div>
        </div>
      )}

      <div className="flex gap-2">
        <button className="pl-submit-btn" onClick={startDrill}>↻ Restart Drill</button>
        <button className="text-[13px] px-3 py-1.5 rounded-md"
          style={{border: "1px solid var(--border-strong)", color: "var(--text-dim)", background: "var(--bg-elev-2)"}}
          onClick={() => setPhase("idle")}>
          ← Back
        </button>
      </div>
    </div>
  );
}

        </span>
        <MetaPill>{marks}-mark</MetaPill>
      </div>
      <div className="text-[15px] leading-relaxed mb-3 p-4 rounded-lg"

/* ────────────────────────────────────────────────────────────────
   CONCEPT NAVIGATOR (Tabs to pick which concept lab)
   ──────────────────────────────────────────────────────────────── */
function ConceptNavigator({ concepts, active, setActive, progressMap }) {
  return (
    <div className="sticky top-[60px] z-40 py-3 px-4 mb-4 rounded-xl flex flex-wrap gap-2"
      style={{background: "var(--bg-overlay)", backdropFilter: "blur(14px)", border: "1px solid var(--border)"}}>
      {concepts.map(c => {
        const p = progressMap[c.num];
        const done = p ? p.correct.length : 0;
        const total = p ? p.totalProblems : 0;
        return (
          <button key={c.num}
            className={"pl-tab-pill " + (active === c.num ? "active" : "")}
            onClick={() => {
              setActive(c.num);
              document.getElementById("concept-lab-" + c.num)?.scrollIntoView({ behavior: "smooth", block: "start" });
            }}>
            <span style={{fontWeight: 600}}>C1.{c.num}</span>
            <span className="opacity-70 ml-2">{c.shortName}</span>
            <span className="ml-2 font-mono text-[11px] opacity-80">{done}/{total} ✓</span>
          </button>
        );
      })}
    </div>
  );
}

        {/* LAYER 1 — Pattern Recognition */}
        <LayerHeader num={1} title="How GATE CS Tests This Concept"
          subtitle="Top rankers classify the question first, then solve. Train the classifier." />
        {patterns.map((p, i) => <PatternCard key={i} idx={i+1} pattern={p} />)}

        {/* Optional PYQ walkthroughs */}
        {pyqs && pyqs.length > 0 && (
          <>
            <LayerHeader num={"1.5"} title="GATE CS PYQ Walkthroughs"
              subtitle="Real GATE CS questions with full reasoning chains. Read, don't solve — these are examples." />

        )}

        {/* LAYER 2 — Progressive Problem Set */}
        <LayerHeader num={2} title="Progressive Problem Set"
          subtitle="2 Easy · 3 Medium · 3 Hard · 1 Killer. Attempt before reveal. Hints only on request." />
        {problems.map((p, i) => <ProblemCard key={p.id} p={p} idx={i+1} progress={progress} />)}

        {/* LAYER 3 — Technique Arsenal */}
        <LayerHeader num={3} title="Technique Arsenal"
          subtitle="How to think, not what to think. Each card is a named, reusable solving algorithm." />
        {techniques.map((t, i) => <TechniqueCard key={i} tech={t} />)}

        {/* LAYER 4 — Mistake Autopsy */}
        <LayerHeader num={4} title="Mistake Autopsy Lab"
          subtitle="Real wrong solutions written exactly as students write them. Each error has a one-line preventive rule." />
        {mistakes.map((m, i) => <MistakeCard key={i} mistake={m} idx={i+1} />)}

        {/* LAYER 5 — Drill Mode */}
        <LayerHeader num={5} title="Timed Drill Mode"
          subtitle="Knowing the answer ≠ executing under 90-second pressure. Train exam temperament separately." />
        <DrillMode conceptNum={num} conceptTitle={title} problems={problems} />
      </div>
    </section>
  );
}
